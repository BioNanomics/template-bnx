name: Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0

jobs:
  create-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch full history for changelog

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    # Python build example
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build package
      run: python -m build

    - name: Check package
      run: twine check dist/*

    # Node.js build example (uncomment if using Node.js)
    # - name: Set up Node.js
    #   uses: actions/setup-node@v4
    #   with:
    #     node-version: '18'
    #     registry-url: 'https://registry.npmjs.org'

    # - name: Install dependencies
    #   run: npm ci

    # - name: Build package
    #   run: npm run build

    # - name: Run tests
    #   run: npm test

    - name: Extract release notes
      id: extract-release-notes
      run: |
        # Extract release notes from CHANGELOG.md
        version=${GITHUB_REF#refs/tags/}
        awk -v version="$version" '
        /^## \[/ { 
          if ($0 ~ version) { 
            found=1; next 
          } else if (found) { 
            exit 
          } 
        } 
        found && /^## \[/ { exit } 
        found { print }
        ' CHANGELOG.md > release_notes.txt

    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        body_path: release_notes.txt
        draft: false
        prerelease: false

    # Python package publishing (uncomment if publishing to PyPI)
    # - name: Publish to PyPI
    #   env:
    #     TWINE_USERNAME: __token__
    #     TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
    #   run: twine upload dist/*

    # Node.js package publishing (uncomment if publishing to npm)
    # - name: Publish to npm
    #   run: npm publish
    #   env:
    #     NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    # Docker image publishing (uncomment if publishing Docker images)
    # - name: Set up Docker Buildx
    #   uses: docker/setup-buildx-action@v2

    # - name: Login to Docker Hub
    #   uses: docker/login-action@v2
    #   with:
    #     username: ${{ secrets.DOCKERHUB_USERNAME }}
    #     password: ${{ secrets.DOCKERHUB_TOKEN }}

    # - name: Build and push Docker image
    #   uses: docker/build-push-action@v4
    #   with:
    #     context: .
    #     push: true
    #     tags: |
    #       your-username/your-project:latest
    #       your-username/your-project:${{ github.ref_name }}

  # Notify about release
  notify:
    needs: create-release
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Notify success
      if: needs.create-release.result == 'success'
      run: |
        echo "✅ Release ${{ github.ref }} created successfully!"
        # Add notification logic here (Slack, Discord, email, etc.)

    - name: Notify failure
      if: needs.create-release.result == 'failure'
      run: |
        echo "❌ Release ${{ github.ref }} failed!"
        # Add failure notification logic here